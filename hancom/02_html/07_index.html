<!DOCTYPE html> <!-- 이건 html 문서 선언 -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지 -->
    <head> <!-- 화면에 안보이는 칸 -->
        <meta charset="UTF-8"> <!-- 한글 -->
        <title>강조와 중첩</title> <!-- 브라우저 탭 이름 -->
    </head>
    <body> <!-- 화면에 보이는 내용 -->
        <!-- 태그 안에 태그 넣기 = 중첩(nesting), strong은 글자를
         굵게 강조 -->
        <p>저는 <strong>개발</strong>하는 것을 좋아합니다</p>
        <!-- '정말'만 굵게 -->
         &lt;
         &gt;
         &amp;
         <p></p>
    </body>
</html>
