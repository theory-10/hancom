<!DOCTYPE html> <!-- 이건 html 문서 선언 -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지 -->
    <head> <!-- 화면에는 안 보이는 준비 칸 -->
        <meta charset="UTF-8"> <!-- 한글 안 깨지게 -->
        <title>입력 품</title> <!-- 브라우저 탭 이름 -->
    </head>
    <body> <!-- 화면에 보이는 칸 -->
        <form> <!-- 입력 칸들을 담는 묶음상자 -->
            <lable> <!-- table = 설명 글자, input : 글자 칸 -->
                이름: <input type="text" placeholder="이름 입력">
                <br>
            </lable>
            <hr>
            <lable>
                목표: <input type="number" placeholder="HTML 능력 목표치 1 ~ 10">
                <br>
            </lable>
            <hr>
            <button type="submit">보내기</button> <!-- 누르는 버튼 -->
        </form>
    </body>
</html>
