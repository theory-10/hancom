<!DOCTYPE html> <!-- 문서 시작 선언 -->
<html lang="ko"> <!-- 한국어 페이지 -->
    <head> <!-- 보이지 않는 칸 -->
        <meta charset="UTF-8"> <!-- 한글이 깨지지 않도록 -->
        <title>글자 꾸미기</title> <!-- 브라우저 탭 이름 -->
    </head>
    <body> <!-- 보이는 내용 칸 -->
        <p><em>기울임 강조</em></p>
        <p><mark>형광팬</mark></p>
        <p><small>작은 글씨</small></p>
        <blockquote>인용</blockquote>
        <p>H <sub>2</sub>0</p>
        <p>X <sup>2</sup></p>
    </body>
</html>
