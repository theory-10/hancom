<!DOCTYPE html> <!-- 문서 시작 선언 -->
<html lang="ko"> <!-- 한국어 페이지 -->
    <head> <!-- 화면에 보이지 않는 칸 -->
        <meta charset="UTF-8"> <!-- 한글 깨지지 않도록 -->
        <title>표 칸 합치기</title> <!-- 브라우저 탭 이름 -->
    </head>
    <body> <!-- 화면에 보이는 진자 내용 칸 -->
        <h1>표 합치기</h1>
        <table border="1"> <!-- 표 전체 상자(border=칸 선) -->
            <thead> <!-- 표 머리 (제목 줄) -->
                <tr>
                    <th colspan="3"> <!-- 가로 3칸을 하나로 합침 -->
                        성적표
                    </th>
                </tr>
                
            </thead>
            <tbody> <!-- 표 몸통 -->
                <tr><td rowspan="4">과목</td><td>영어</td><td>90</td></tr>
                <tr><td>수학</td><td>85</td></tr>
                <tr><td>사회</td><td>85</td></tr>
                <tr><td>공학</td><td>85</td></tr>
            </tbody>

        </table>
    </body>
</html>
