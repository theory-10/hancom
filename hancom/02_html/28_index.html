<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>시맨틱 구조</title>
    </head>
    <body>
        <header>
            <h1>시맨틱 구조</h1>
            <nav>홈, 소개, 연락처</nav>
        </header>
        <main>
            <section> <!-- 완결된 글 하나 -->
                <article>첫 번째 글 내용</article>
            </section>
        </main>
        <aside>곁다리 정보(사이드 바)</aside> <!-- 본문 옆 보조 내용 -->
        <footer> <!-- 맨 아래 꼬리말 -->
          2026 내 사이트 
        </footer>
    </body>
</html>

<!-- div는 뜻 없는 빈 상자
 시맨틱 태그는 이름을 보고 어떤 구역인지 드러남
 핵심 : header, nav, main, section, artcle, aside, footer -->
