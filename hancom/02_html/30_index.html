<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>음성 넣기</title>
    </head>
    <body>
        <audio controls> <!-- 음성 재생 상자(재생 버튼) -->
            <source src="song.mp3" type="audio/mpeg"> <!-- mp3 후보 -->
            <source src="song.ogg" type="audio/ogg"> <!-- ogg 후보(둘 중 가능한 것 재생) -->
            내 브라우저는 audio 미지원 <!-- 둘 다 안되면 보이는 글 -->
        </audio>
    </body>
</html>
