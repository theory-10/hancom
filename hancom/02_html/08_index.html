<!DOCTYPE html> <!-- 이건 html 문서 선언 -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지 -->
    <head> <!-- 화면에는 안 보이는 칸 -->
        <meta charset="UTF-8"> <!-- 한글 안 깨지게 -->
        <title>이미지 넣기</title> <!-- 브라우저 탭 이름 -->
    </head>
    <body> <!-- 화면에 보이는 내용칸 -->
        <!-- img = 화면에 사진 붙이기, 닫는 태그 없는 빈 요소라 />로 끝맺음 -->
         <!-- src = 사진 주소 / alt = 사진이 안 뜰 때 대신 보일 글자 -->
        <img src="../02_html/image.jpg" alt="예시 사진" width="500" height="500"/>
    </body>
</html>
