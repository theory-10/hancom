<!DOCTYPE html> <!-- 이건 html 문서야 알려주기 -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지 -->
    <head> <!-- 화면에는 안 보이는 준비 칸 -->
        <meta charset="UTF-8"> <!-- 한글 안 깨지게 -->
        <title>태그 + 뼈대</title> <!-- 브라우저 탭 -->
    </head>
    <body> <!-- 화면에 보이는 칸 -->
        <h1>
            안녕하세요!
        </h1>
    </body>
</html>
<!-- - 요소(element) = 여는 태그 + 내용 + 닫는 태그
 - 태그 이름은 대소문자 안 가림(h1 = H1) -->
