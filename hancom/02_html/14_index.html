<!DOCTYPE html> <!-- 이건 html 문서 선언 -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지 -->
    <head> <!-- 화면에는 안 보이는 칸 -->
        <meta charset="UTF-8"> <!-- 한글 안 깨지게 -->
        <title>시간표</title> <!-- 브라우저 탭 이름 -->
    </head>
    <body> <!-- 화면에 보이는 진자 내용 칸 -->
        <table border="1">
            <!-- tr = 가로 한줄, th = 제목 칸 -->
            <tr><th>요일</th><th>과목</th><th>시간</th></tr>
            <!-- td = 보통 내용 칸 -->
            <tr><td>월</td><td>국어</td><td>7h</td></tr>
            <tr><td>화</td><td>수학</td><td>7h</td></tr>
        </table>
    </body>
</html>
