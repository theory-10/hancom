<!DOCTYPE html> <!-- 이건 html -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지 -->
    <head> <!-- 화면에 안 보이는 준비 칸 -->
        <meta charset="UTF-8"> <!-- 한글 안 깨지게 -->
        <title>제목과 문단</title> <!-- 브라우저 탭 이름 -->
    </head>
    <body> <!-- 화면에 보이는 내용 칸 -->
        <!-- 제목은 크기 6단계: h1이 제일 크고 
         숫자가 커질수록 작아짐 -->
        <h1>h1 : 가장 큰 제목</h1>
        <h2>h2 : 중간 제목</h2>
        <h3>h3 : 작은 제목</h3>
        <h4>h4 : 더 작은 제목</h4>
        <h5>h5 : 더더 작은 제목</h5>
        <h6>h6 : 더더더 작은 제목</h6>
        <p>저는 코딩을 처음 배우는 학생입니다.</p> 
        <!-- p = 글 한덩이 (문단) -->
    </body>
</html>
