<!-- 
 1. 32_README.md 파일 형식 정리
 2. 33_README.md 파일 클로드 코드 설치 정리
 3. 34_index.html 미니 프로젝트 : 지금까지 배운 태그 활용하여 
 웹 사이트 구축 후 깃허브 업데이트 -->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 소개</title>
</head>
<body>
    <heaer><!-- class=스타일용 이름표(css에서 .site-header로 꾸밈) -->

        <h1>박진</h1>
        <nav>
            <a href="#about" class="nav-link">소개</a> . 
            <!-- 같은 class="nav-link" 3개 -> 한 번에 똑같이 꾸밈 -->
        </nav>
        <nav>
            <a href="#skill" class="nav-link">할 줄 아는 것</a> .
        </nav>
        <nav>
            <a href="#contact" class="nav-link">연락처</a>
        </nav>
    </heaer>

    <main>
        <section class="section" id="about">
            <h2>소개</h2>
            <p>안녕하세요. <strong>HTML을 이제 배운</strong>박진 입니다.</p>
            <img src="../02_html/me.jpg" alt="내 프로필 사진" width="200" class="profile-img">
        </section>

        <section class="section" id="skill">
            <h2>할 줄 아는 것</h2>
            <ul>
                <li>HTML 뼈대 만들기</li>
                <li>시맨틱 태그로 구조 짜기</li>
                <li>표, 폼, 링크 넣기</li>
            </ul>

            <h3>공부 기록</h3>
            <table>
                <thead><tr><th>주차</th><th>배운 것</th></tr></thead>
                <tbody>
                    <tr><td>1주</td><td>태그·폼·시맨틱</td></tr>
                </tbody>
            </table>
        </section>

        <section class="section" id="contact">
            <h2>연락처</h2>
            <form action="/send" method="post">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required> 
                <br>
                <br>
                <br>

                <!-- id="name"=label의 for와 짝(고유) / name="name=서버로 보낼 값의 이름" -->
                 <label for="msg">하고 싶은 말</label>
                 <br>
                 <textarea id="msg" name="msg" rows="2"></textarea>

                 <button type="submit" class="btn">보내기</button> 
                 <!-- class="btn"=버튼 공통 스타일(여러버튼에 재사용) -->
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <small>&copy; 2026 박진</small>
    </footer>
    
</body>
</html>
